<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="falabem">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00a884"/>
      <stop offset="1" stop-color="#058f72"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square speech bubble body -->
  <rect x="16" y="16" width="480" height="460" rx="104" ry="104" fill="url(#bg)"/>
  <!-- Bottom-left tail — small triangle anchored on the rounded corner -->
  <path d="M140 472 L92 512 L172 472 Z" fill="#058f72"/>
  <!-- Monogram f — lowercase, tech-clean -->
  <text x="256" y="362"
        font-family="'SF Pro Display','Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
        font-size="360"
        font-weight="800"
        fill="#ffffff"
        text-anchor="middle">f</text>
</svg>
